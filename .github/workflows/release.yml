name: Release Artifact

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.1.0"
        required: true
        default: "0.1.0"

permissions:
  contents: read

env:
  DOTNET_VERSION: "9.0.x"
  PROJECT_FILE: "src/VoiceTray/VoiceTray.csproj"
  PUBLISH_DIR: "artifacts/publish/VoiceTray"
  ZIP_DIR: "artifacts/zip"

jobs:
  publish-windows:
    name: Publish Windows portable artifact
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore $env:PROJECT_FILE

      - name: Build
        run: dotnet build $env:PROJECT_FILE --configuration Release --no-restore

      - name: Test
        run: dotnet test VoiceTray.sln --configuration Release --no-build --verbosity normal

      - name: Publish
        run: >
          dotnet publish $env:PROJECT_FILE
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output $env:PUBLISH_DIR
          /p:PublishSingleFile=false
          /p:IncludeNativeLibrariesForSelfExtract=true

      - name: Create zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:ZIP_DIR | Out-Null
          $zipPath = Join-Path $env:ZIP_DIR "VoiceTray-${{ github.event.inputs.version }}-win-x64-portable.zip"
          Compress-Archive -Path "$env:PUBLISH_DIR/*" -DestinationPath $zipPath -Force
          Write-Host "Created $zipPath"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: VoiceTray-${{ github.event.inputs.version }}-win-x64-portable
          path: artifacts/zip/*.zip
          if-no-files-found: error
          retention-days: 14

